pipeline:
  num_queries: 5
  top_papers: 20
  papers_per_query_per_source: 25
  request_timeout_s: 60
  max_workers: 8
  llm_max_concurrency: 2
  use_graph_analyzer: true

document_converter:
  provider_name: pymupdf
  use_arxiv_html: true

reranker:
  provider_name: jina
  fallback: langsearch

sources:
  arxiv_enabled: true
  openalex_enabled: true
  semantic_scholar_enabled: false

llm:
  default:
    provider: openai
    model: gpt-4.1-mini
    temperature: 0.3

  query_rewriter:
    provider: openai
    model: gpt-4.1-mini
    temperature: 0.3

  insight_extractor:
    provider: openai
    model: gpt-4.1-mini
    temperature: 0.3

  gap_identifier:
    provider: openai
    model: gpt-4.1-mini
    temperature: 0.3

  aggregator:
    provider: openai
    model: gpt-4.1-mini
    temperature: 0.3
